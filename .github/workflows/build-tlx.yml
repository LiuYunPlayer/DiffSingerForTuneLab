# DiffSingerForTuneLab TLX Build
# 构建插件并打包为 .tlx（= zip，内含 manifest.json + DiffSingerForTuneLab.dll + 依赖树）。
# 触发：push 到 master（有实质变更才出包）+ 手动 dispatch。产出为 14 天临时 artifact（非 Release）。
#
# 打包统一委托给 tools/pack-tlx.ps1（与本地 dev 打包同一份脚本 = 单一事实来源），产物含：
#   manifest.json / DiffSingerForTuneLab.dll / deps.json / OpenUtau.Core.dll / NuGet 私有依赖
#   runtimes/<rid>/native/   ← DirectML.dll + onnxruntime 原生库（宿主经 deps.json 解析）
#   mlruntime/               ← MLRuntime.exe 子进程（去重 onnxruntime，共用父目录 runtimes/）
#   （脚本会剪除输出根部冗余的原生库副本与调试符号，避免 SDK target 拷出的 ~17MB 无用体积）
#
# 构建前提：TuneLab SDK 以 sibling 目录形式引用（ProjectReference ..\TuneLab\TuneLab.SDK\）。
#   本 workflow 克隆 TuneLab release/2.0.0（与 manifest sdk-version "1.0" 对齐）到 ../TuneLab。

name: Build TLX

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-tlx:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout DiffSingerForTuneLab
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: DiffSingerForTuneLab

      - name: Checkout TuneLab SDK (release/2.0.0)
        uses: actions/checkout@v4
        with:
          repository: LiuYunPlayer/TuneLab
          ref: release/2.0.0
          path: TuneLab
          sparse-checkout: |
            TuneLab.SDK
            TuneLab.Foundation
          sparse-checkout-cone-mode: false

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Get short SHA
        uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with:
          length: 7

      - name: Build & pack .tlx
        shell: pwsh
        run: |
          # 单一事实来源：直接调用维护的打包脚本（与本地 dev 打包同一份逻辑），杜绝 CI 内联
          # 逻辑漂移。脚本内部会：构建主插件 + MLRuntime，装配 mlruntime/ 子进程（去重
          # onnxruntime），剪除输出根部冗余原生库/调试符号，产物落 tools/tlx/<id>-<version>.tlx。
          pwsh DiffSingerForTuneLab/tools/pack-tlx.ps1 -Configuration Release

      - name: Rename artifact with short SHA
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tlx = Get-ChildItem DiffSingerForTuneLab/tools/tlx/*.tlx | Select-Object -First 1
          if (-not $tlx) { Write-Error "未找到打包产物 .tlx" }
          $dest = Join-Path $tlx.Directory.FullName "DiffSingerForTuneLab-${{ steps.short-sha.outputs.sha }}.tlx"
          Move-Item $tlx.FullName $dest -Force
          Write-Host ("产物: {0} ({1:N2} MB)" -f (Split-Path $dest -Leaf), ((Get-Item $dest).Length/1MB))

      - name: Upload .tlx artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiffSingerForTuneLab-${{ steps.short-sha.outputs.sha }}
          path: DiffSingerForTuneLab/tools/tlx/DiffSingerForTuneLab-*.tlx
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ steps.short-sha.outputs.sha }}
          path: |
            DiffSingerForTuneLab/**/bin/**/*.log
          retention-days: 7
